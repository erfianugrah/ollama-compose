services:
  llama-server:
    build:
      context: .
      dockerfile: llama-server.Dockerfile
    image: erfianugrah/llama-server:cuda12.8-sm120
    hostname: llama-server
    container_name: llama_server
    restart: unless-stopped
    # Bind to localhost only -- reachable from WSL2/Windows host but not the LAN
    ports:
      - "127.0.0.1:11434:8080"
    # Model-agnostic entrypoint — all model-specific config comes from .env
    # via `make switch MODEL=<name>`. See models/*.env for available presets.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        exec llama-server \
          --hf-repo $${MODEL_REPO} \
          --hf-file $${MODEL_FILE} \
          $${MMPROJ_FILE:+--mmproj /models/$${MMPROJ_FILE}} \
          --jinja \
          $${TEMPLATE_FILE:+--chat-template-file /models/$${TEMPLATE_FILE}} \
          $${REASONING:+--reasoning $${REASONING}} \
          --port 8080 \
          --host 0.0.0.0 \
          -ngl 99 \
          --flash-attn on \
          -ctk q8_0 \
          -ctv q8_0 \
          -c $${CONTEXT_SIZE:-65536} \
          --temp $${TEMPERATURE:-1.0} \
          --top-p $${TOP_P:-0.95} \
          --top-k $${TOP_K:-64} \
          $${MIN_P:+--min-p $${MIN_P}} \
          -b 2048 \
          -ub 512 \
          --threads 8 \
          --threads-batch 8 \
          -v \
          --metrics
    environment:
      - MODEL_REPO=${MODEL_REPO}
      - MODEL_FILE=${MODEL_FILE}
      - MMPROJ_FILE=${MMPROJ_FILE}
      - TEMPLATE_FILE=${TEMPLATE_FILE}
      - REASONING=${REASONING}
      - CONTEXT_SIZE=${CONTEXT_SIZE}
      - TEMPERATURE=${TEMPERATURE}
      - TOP_P=${TOP_P}
      - TOP_K=${TOP_K}
      - MIN_P=${MIN_P}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility]
    # Larger shared memory for CUDA IPC
    shm_size: "2g"
    volumes:
      # Persistent model cache so HF downloads survive restarts
      - ~/docker-volumes/llama-server:/root/.cache
      # Model assets: mmproj, custom templates (downloaded by `make switch`)
      - ~/docker-volumes/llama-server/models:/models
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      llm:
        ipv4_address: 172.28.0.2

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.12
    hostname: open_webui
    container_name: open_webui
    restart: unless-stopped
    environment:
      # Open WebUI connects via the OpenAI-compatible endpoint
      - OPENAI_API_BASE_URL=http://172.28.0.2:8080/v1
      - OPENAI_API_KEY=not-needed
      # Disable Ollama integration since we're using llama-server directly
      - OLLAMA_BASE_URL=
      # Persistent secret key so sessions survive container restarts.
      # Generate once with: openssl rand -hex 32
      # Then add WEBUI_SECRET_KEY=<value> to your .env file.
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      # Disable telemetry
      - ANONYMIZED_TELEMETRY=false
      - DO_NOT_TRACK=true
      - SCARF_NO_ANALYTICS=true
    # Bind to localhost -- accessible from Windows browser via WSL2 networking
    ports:
      - "127.0.0.1:3000:8080"
    volumes:
      - ~/docker-volumes/webui:/app/backend/data
    tmpfs:
      - /tmp:noexec,nosuid,size=256m
    depends_on:
      llama-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      llm:
        ipv4_address: 172.28.0.3

networks:
  llm:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
          gateway: 172.28.0.1
