services:
  # ── Model-switching proxy ────────────────────────────────────────────
  # Sits in front of llama-server. Auto-swaps models when the requested
  # model differs from what's loaded — just select a different model in
  # OpenCode's /models menu and the proxy handles the rest.
  model-proxy:
    build:
      context: proxy
      dockerfile: Dockerfile
    image: erfianugrah/model-proxy:latest
    hostname: model-proxy
    container_name: model_proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    environment:
      - LLAMA_HOST=llama-server
      - LLAMA_PORT=8080
      - PROXY_PORT=11434
      - PRESETS_DIR=/presets
      - PROJECT_DIR=/project
      - HEALTH_TIMEOUT=180
      # Pass host HOME so docker compose inside proxy resolves ~ correctly
      - HOST_HOME=${HOME}
    volumes:
      # Docker socket — needed to recreate llama-server on model swap
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Project dir — proxy reads .env and runs docker compose
      - .:/project:rw
      # Model presets (read-only)
      - ./models:/presets:ro
    depends_on:
      llama-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      llm:
        ipv4_address: 172.28.0.4

  # ── LLM inference engine ─────────────────────────────────────────────
  # Model-agnostic — all config comes from .env (set by proxy or Makefile).
  # Not exposed to host; only reachable via the proxy on the llm network.
  llama-server:
    build:
      context: .
      dockerfile: llama-server.Dockerfile
    image: erfianugrah/llama-server:cuda12.8-sm120
    hostname: llama-server
    container_name: llama_server
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        exec llama-server \
          --hf-repo $${MODEL_REPO} \
          --hf-file $${MODEL_FILE} \
          $${MMPROJ_FILE:+--mmproj /models/$${MMPROJ_FILE}} \
          --jinja \
          $${TEMPLATE_FILE:+--chat-template-file /models/$${TEMPLATE_FILE}} \
          $${REASONING:+--reasoning $${REASONING}} \
          --port 8080 \
          --host 0.0.0.0 \
          -ngl 99 \
          --flash-attn on \
          -ctk q8_0 \
          -ctv q8_0 \
          -c $${CONTEXT_SIZE:-65536} \
          --temp $${TEMPERATURE:-1.0} \
          --top-p $${TOP_P:-0.95} \
          --top-k $${TOP_K:-64} \
          $${MIN_P:+--min-p $${MIN_P}} \
          -b 2048 \
          -ub 512 \
          --threads 8 \
          --threads-batch 8 \
          -v \
          --metrics
    environment:
      - MODEL_REPO=${MODEL_REPO}
      - MODEL_FILE=${MODEL_FILE}
      - MMPROJ_FILE=${MMPROJ_FILE}
      - TEMPLATE_FILE=${TEMPLATE_FILE}
      - REASONING=${REASONING}
      - CONTEXT_SIZE=${CONTEXT_SIZE}
      - TEMPERATURE=${TEMPERATURE}
      - TOP_P=${TOP_P}
      - TOP_K=${TOP_K}
      - MIN_P=${MIN_P}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility]
    shm_size: "2g"
    volumes:
      - ~/docker-volumes/llama-server:/root/.cache
      - ~/docker-volumes/llama-server/models:/models
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      llm:
        ipv4_address: 172.28.0.2

  # ── Chat UI ──────────────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.12
    hostname: open_webui
    container_name: open_webui
    restart: unless-stopped
    environment:
      # Open WebUI connects via the proxy (which forwards to llama-server)
      - OPENAI_API_BASE_URL=http://172.28.0.4:11434/v1
      - OPENAI_API_KEY=not-needed
      - OLLAMA_BASE_URL=
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - ANONYMIZED_TELEMETRY=false
      - DO_NOT_TRACK=true
      - SCARF_NO_ANALYTICS=true
    ports:
      - "127.0.0.1:3000:8080"
    volumes:
      - ~/docker-volumes/webui:/app/backend/data
    tmpfs:
      - /tmp:noexec,nosuid,size=256m
    depends_on:
      model-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      llm:
        ipv4_address: 172.28.0.3

networks:
  llm:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
          gateway: 172.28.0.1
