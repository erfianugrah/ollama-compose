services:
  ollama:
    image: ollama/ollama:0.20.2
    hostname: ollama
    container_name: ollama
    restart: unless-stopped
    # Bind to localhost only -- reachable from WSL2/Windows host but not the LAN
    ports:
      - "127.0.0.1:11434:11434"
    environment:
      # Flash attention -- critical for Blackwell (5090) performance
      - OLLAMA_FLASH_ATTENTION=1
      # Concurrent requests -- the 26b MoE (3.8B active params) is much lighter
      # than the 31B dense model, so parallel=2 fits comfortably in 32GB VRAM
      # with 64k context. VRAM cost: NUM_PARALLEL * CONTEXT_LENGTH for KV cache.
      - OLLAMA_NUM_PARALLEL=2
      # The 26b MoE + 64k context uses ~20GB VRAM, leaving room for a second
      # small model if needed
      - OLLAMA_MAX_LOADED_MODELS=2
      # KV cache quantization -- reduces VRAM usage for long contexts with
      # minimal quality loss, lets you run bigger models or more in parallel
      - OLLAMA_KV_CACHE_TYPE=q8_0
      # Keep models loaded for 24h instead of default 5m -- avoids cold-start
      # lag when switching back to a model you used recently
      - OLLAMA_KEEP_ALIVE=24h
      # Context window -- Ollama docs recommend at least 64k for agentic tools
      # like OpenCode (system prompt alone can exceed 22k tokens).
      # VRAM budget: 20GB model + ~6GB KV cache (64k*1 parallel, q8_0) ≈ 26-28GB.
      - OLLAMA_CONTEXT_LENGTH=65536
      # Large models (70B+) can take a while to load into VRAM
      - OLLAMA_LOAD_TIMEOUT=10m
    deploy:
      resources:
        limits:
          # Explicit CPU limit silences the "failed to parse CPU allowed micro
          # secs" warning that Ollama logs inside cgroup-v2 containers.
          cpus: "8"
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility]
    # Larger shared memory for model weight transfers and CUDA IPC
    shm_size: "2g"
    volumes:
      - ~/docker-volumes/ollama:/root/.ollama
    healthcheck:
      # The ollama image does not include curl; use the built-in CLI instead
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      ollama:
        ipv4_address: 172.28.0.2

  # One-shot init container that pre-loads the default model into VRAM so the
  # first real request doesn't trigger a ~50s cold-start (which causes 500s
  # from Open WebUI and timeouts from OpenCode).
  warmup:
    image: curlimages/curl:8.12.1
    container_name: ollama_warmup
    depends_on:
      ollama:
        condition: service_healthy
    # A minimal completion request is enough to force Ollama to load the model.
    entrypoint: ["sh", "-c", "echo 'Warming up gemma4:26b...' && curl -sf --max-time 300 -H 'Content-Type: application/json' -d '{\"model\":\"gemma4:26b\",\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}],\"max_tokens\":1}' http://172.28.0.2:11434/v1/chat/completions && echo 'Model loaded.' || echo 'Warmup failed (model may not be pulled yet).'"]
    restart: "no"
    networks:
      ollama:
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "1"

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.12
    hostname: open_webui
    container_name: open_webui
    restart: unless-stopped
    environment:
      - OLLAMA_BASE_URL=http://172.28.0.2:11434
      # Persistent secret key so sessions survive container restarts.
      # Generate once with: openssl rand -hex 32
      # Then add WEBUI_SECRET_KEY=<value> to your .env file.
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      # Disable telemetry
      - ANONYMIZED_TELEMETRY=false
      - DO_NOT_TRACK=true
      - SCARF_NO_ANALYTICS=true
    # Bind to localhost -- accessible from Windows browser via WSL2 networking
    ports:
      - "127.0.0.1:3000:8080"
    volumes:
      - ~/docker-volumes/webui:/app/backend/data
    tmpfs:
      - /tmp:noexec,nosuid,size=256m
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      ollama:
        ipv4_address: 172.28.0.3

networks:
  ollama:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
          gateway: 172.28.0.1
