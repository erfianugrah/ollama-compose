services:
  llama-server:
    build:
      context: .
      dockerfile: llama-server.Dockerfile
    image: local/llama-server:cuda12.8-sm120
    hostname: llama-server
    container_name: llama_server
    restart: unless-stopped
    # Bind to localhost only -- reachable from WSL2/Windows host but not the LAN
    ports:
      - "127.0.0.1:11434:8080"
    # llama-server flags for Gemma 4 26B MoE
    # -hf auto-downloads the GGUF from HuggingFace on first run
    command:
      - --hf-repo
      - ggml-org/gemma-4-26b-a4b-it-GGUF
      - --hf-file
      - gemma-4-26B-A4B-it-Q4_K_M.gguf
      # Chat template is auto-detected from the GGUF metadata.
      # Gemma 4 models embed a jinja template that triggers the dedicated gemma4
      # code path (PEG_GEMMA4) with proper tool-calling support.
      # Do NOT use --chat-template gemma — that forces the simpler Gemma 1/2 template.
      - --port
      - "8080"
      - --host
      - 0.0.0.0
      # Offload all layers to GPU
      - -ngl
      - "99"
      # Flash attention -- works correctly in llama.cpp (broken in Ollama 0.20.x)
      - --flash-attn
      - "on"
      # Quantized KV cache -- halves VRAM usage with minimal quality loss
      - -ctk
      - q8_0
      - -ctv
      - q8_0
      # Context window -- 64k for agentic tools like OpenCode
      - -c
      - "65536"
      # Gemma 4 best-practice sampling parameters
      - --temp
      - "1.0"
      - --top-p
      - "0.95"
      - --top-k
      - "64"
      # Batch sizes for prompt processing
      - -b
      - "2048"
      - -ub
      - "512"
      # Threads for CPU-side work
      - --threads
      - "8"
      - --threads-batch
      - "8"
      # Verbose logging — shows token rates, VRAM usage, prompt eval stats
      - -v
      # Prometheus metrics endpoint at /metrics
      - --metrics
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility]
    # Larger shared memory for CUDA IPC
    shm_size: "2g"
    volumes:
      # Persistent model cache so HF downloads survive restarts
      - ~/docker-volumes/llama-server:/root/.cache
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      ollama:
        ipv4_address: 172.28.0.2

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.12
    hostname: open_webui
    container_name: open_webui
    restart: unless-stopped
    environment:
      # Open WebUI connects via the OpenAI-compatible endpoint
      - OPENAI_API_BASE_URL=http://172.28.0.2:8080/v1
      - OPENAI_API_KEY=not-needed
      # Disable Ollama integration since we're using llama-server directly
      - OLLAMA_BASE_URL=
      # Persistent secret key so sessions survive container restarts.
      # Generate once with: openssl rand -hex 32
      # Then add WEBUI_SECRET_KEY=<value> to your .env file.
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      # Disable telemetry
      - ANONYMIZED_TELEMETRY=false
      - DO_NOT_TRACK=true
      - SCARF_NO_ANALYTICS=true
    # Bind to localhost -- accessible from Windows browser via WSL2 networking
    ports:
      - "127.0.0.1:3000:8080"
    volumes:
      - ~/docker-volumes/webui:/app/backend/data
    tmpfs:
      - /tmp:noexec,nosuid,size=256m
    depends_on:
      llama-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      ollama:
        ipv4_address: 172.28.0.3

networks:
  ollama:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
          gateway: 172.28.0.1
